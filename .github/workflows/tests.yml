name: Test Suite

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      # The commit engine is never executed in CI.
